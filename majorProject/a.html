<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SneakerStore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .cart-panel { transform: translateX(100%); transition: transform 0.35s cubic-bezier(.4,0,.2,1); }
    .cart-panel.open { transform: translateX(0); }
    .overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    .overlay.open { opacity: 1; pointer-events: all; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white border-b border-gray-100 sticky top-0 z-30 px-6 py-4 flex items-center justify-between shadow-sm">
    <span class="text-xl font-black tracking-tight text-gray-900">👟 SneakerStore</span>
    <button id="cart-toggle" class="relative flex items-center gap-2 bg-gray-900 text-white px-4 py-2 rounded-xl text-sm font-semibold hover:bg-gray-700 transition-all active:scale-95">
      <span class="material-symbols-outlined text-[18px]">shopping_cart</span>
      Cart
      <span id="cart-counter" class="absolute -top-2 -right-2 bg-red-500 text-white text-[10px] font-black w-5 h-5 rounded-full flex items-center justify-center">0</span>
    </button>
  </nav>

  <!-- Product Grid -->
  <main class="max-w-6xl mx-auto px-6 py-10">
    <h1 class="text-3xl font-black text-gray-900 mb-2">New Arrivals</h1>
    <p class="text-gray-400 mb-8 text-sm">Step into performance</p>
    <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
  </main>

  <!-- Cart Overlay -->
  <div id="overlay" class="overlay fixed inset-0 bg-black/40 z-40" onclick="closeCart()"></div>

  <!-- Cart Panel -->
  <aside id="cart-panel" class="cart-panel fixed top-0 right-0 h-full w-full max-w-sm bg-white z-50 flex flex-col shadow-2xl">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-100">
      <h2 class="text-lg font-black text-gray-900">Your Cart</h2>
      <button onclick="closeCart()" class="w-8 h-8 flex items-center justify-center rounded-full hover:bg-gray-100 transition-colors">
        <span class="material-symbols-outlined text-[20px] text-gray-500">close</span>
      </button>
    </div>

    <div id="cart-grid" class="flex-1 overflow-y-auto p-4 flex flex-col gap-3"></div>

    <!-- Totals -->
    <div class="border-t border-gray-100 px-5 py-4 space-y-2 bg-gray-50">
      <div class="flex justify-between text-sm text-gray-500">
        <span>Subtotal</span><span id="subtotal" class="font-medium text-gray-800">$0.00</span>
      </div>
      <div class="flex justify-between text-sm text-gray-500">
        <span>Tax (10%)</span><span id="tax" class="font-medium text-gray-800">$0.00</span>
      </div>
      <div class="flex justify-between text-base font-black text-gray-900 pt-2 border-t border-gray-200">
        <span>Total</span><span id="grandtotal">$0.00</span>
      </div>
      <button class="w-full mt-3 bg-gray-900 text-white py-3 rounded-xl font-bold text-sm hover:bg-gray-700 active:scale-95 transition-all">
        Checkout →
      </button>
    </div>
  </aside>

<script>
  // ── Data ──────────────────────────────────────────────
  const product = [
    { id:1, Image:"https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb?w=600&q=80", title:"UltraBoost Speed Pro",  price:"149.00", rating:"4.7", wishlist:false, type:"new" },
    { id:2, Image:"https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=600&q=80", title:"AirFlex Max 2025",       price:"139.00", rating:"4.6", wishlist:true,  type:"trending" },
    { id:3, Image:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80", title:"StreetRunner Elite",      price:"119.00", rating:"4.3", wishlist:false, type:"sale" },
    { id:4, Image:"https://www.underarmour.in/media/catalog/product/cache/94aed228cda806fc9e3c8a7bf666ca42/1/0/10.5-120260311062613960.jpg", title:"Velocity Knit ZR", price:"159.00", rating:"4.8", wishlist:true,  type:"premium" }
  ];

  const typeBadgeColor = {
    trending: "bg-yellow-400 text-yellow-900",
    sale:     "bg-red-500 text-white",
    premium:  "bg-purple-600 text-white",
    new:      "bg-gray-900 text-white"
  };

  // ── State ─────────────────────────────────────────────
  let cartData = JSON.parse(localStorage.getItem("cart")) || [];

  // ── Cart counter ──────────────────────────────────────
  const cartCounter = document.querySelector("#cart-counter");

  function syncCounter() {
    const total = cartData.reduce((acc, i) => acc + (i.quantity || 1), 0);
    cartCounter.textContent = total;
    localStorage.setItem("cart-count", total);
  }
  syncCounter();

  // ── Render products ───────────────────────────────────
  const grid = document.querySelector("#product-grid");

  product.forEach(items => {
    const badgeClass = typeBadgeColor[items.type] || "bg-gray-900 text-white";
    const heartClass = items.wishlist ? "text-red-500" : "text-gray-400";
    const heartFill  = items.wishlist ? "'FILL' 1" : "'FILL' 0";

    const card = document.createElement("div");
    card.innerHTML = `
      <div class="group bg-white rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-transparent hover:border-gray-200 flex flex-col h-full">
        <div class="relative aspect-[4/5] overflow-hidden bg-gray-100">
          <img src="${items.Image}" alt="${items.title}"
               class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" />
          <button data-wishid="${items.id}"
            class="wishlist-btn absolute top-3 right-3 w-9 h-9 bg-white/80 backdrop-blur-md rounded-full flex items-center justify-center ${heartClass} hover:scale-110 active:scale-90 transition-all shadow-sm">
            <span class="material-symbols-outlined text-[18px]" style="font-variation-settings: ${heartFill};">favorite</span>
          </button>
          <span class="absolute top-3 left-3 ${badgeClass} px-2.5 py-0.5 rounded-full text-[10px] font-black uppercase tracking-wider">
            ${items.type}
          </span>
        </div>
        <div class="p-4 flex flex-col flex-grow">
          <div class="flex items-center gap-1 mb-1.5">
            <span class="material-symbols-outlined text-orange-400 text-sm" style="font-variation-settings: 'FILL' 1;">star</span>
            <span class="text-sm font-bold text-gray-800">${items.rating}</span>
            <span class="text-xs text-gray-400">(124)</span>
          </div>
          <h3 class="text-sm font-bold text-gray-900 mb-1 leading-tight">${items.title}</h3>
          <div class="mt-auto flex items-center justify-between pt-3">
            <span class="text-xl font-black text-gray-900">$${items.price}</span>
            <button class="w-9 h-9 bg-gray-900 text-white rounded-xl flex items-center justify-center hover:bg-gray-700 active:scale-95 transition-all">
              <span class="addtoCart material-symbols-outlined text-[18px]" data-id="${items.id}">add_shopping_cart</span>
            </button>
          </div>
        </div>
      </div>`;
    grid.append(card);
  });

  
  grid.addEventListener("click", e => {
    if (e.target.classList.contains("addtoCart")) {
      const id   = e.target.dataset.id;
      const item = product.find(p => p.id == id);
      const checkCart = cartData.find(c => c.id == id);

      if (checkCart) {
        checkCart.quantity = (checkCart.quantity || 1) + 1;
      } else {
        cartData.push({ ...item, quantity: 1 });
      }

      localStorage.setItem("cart", JSON.stringify(cartData));
      syncCounter();
      renderCart();

      // Bounce animation on counter
      cartCounter.classList.add("scale-125");
      setTimeout(() => cartCounter.classList.remove("scale-125"), 200);
    }

    // Wishlist toggle
    if (e.target.closest(".wishlist-btn")) {
      const btn  = e.target.closest(".wishlist-btn");
      const id   = btn.dataset.wishid;
      const p    = product.find(x => x.id == id);
      p.wishlist = !p.wishlist;
      const icon = btn.querySelector(".material-symbols-outlined");
      if (p.wishlist) {
        btn.classList.replace("text-gray-400", "text-red-500");
        icon.style.fontVariationSettings = "'FILL' 1";
      } else {
        btn.classList.replace("text-red-500", "text-gray-400");
        icon.style.fontVariationSettings = "'FILL' 0";
      }
    }
  });

  // ── Render cart ───────────────────────────────────────
  const cartGrid  = document.querySelector("#cart-grid");
  const subtotalEl= document.querySelector("#subtotal");
  const taxEl     = document.querySelector("#tax");
  const grandEl   = document.querySelector("#grandtotal");

  function renderCart() {
    cartGrid.innerHTML = "";

    if (cartData.length === 0) {
      cartGrid.innerHTML = `<div class="flex flex-col items-center justify-center h-full gap-3 text-gray-300">
        <span class="material-symbols-outlined text-5xl">shopping_bag</span>
        <p class="text-sm font-medium">Your cart is empty</p>
      </div>`;
    }

    cartData.forEach((item, index) => {
      const div = document.createElement("div");
      div.innerHTML = `
        <div class="bg-white rounded-xl border border-black/10 p-4 flex gap-3 items-center">
          <div class="w-16 h-20 rounded-lg overflow-hidden flex-shrink-0 bg-gray-100">
            <img src="${item.Image}" class="w-full h-full object-cover" />
          </div>
          <div class="flex-1 min-w-0 flex flex-col gap-2">
            <div>
              <h3 class="text-sm font-semibold text-gray-900 truncate">${item.title}</h3>
              <p class="text-sm font-bold text-gray-900 mt-0.5">$${item.price}</p>
            </div>
            <div class="flex items-center justify-between">
              <div class="flex items-center border border-black/15 rounded-lg w-fit overflow-hidden">
                <button data-action="dec" data-index="${index}"
                  class="qty-btn w-7 h-7 flex items-center justify-center text-gray-500 hover:bg-gray-100 text-sm transition-colors">−</button>
                <span class="w-7 h-7 flex items-center justify-center text-xs font-bold border-x border-black/10">${item.quantity || 1}</span>
                <button data-action="inc" data-index="${index}"
                  class="qty-btn w-7 h-7 flex items-center justify-center text-gray-500 hover:bg-gray-100 text-sm transition-colors">+</button>
              </div>
              <button data-remove="${index}" class="remove-btn text-gray-300 hover:text-red-400 transition-colors">
                <span class="material-symbols-outlined text-[18px]">delete</span>
              </button>
            </div>
          </div>
        </div>`;
      cartGrid.append(div);
    });

    updateTotals();
  }

  // ── Cart qty / remove ─────────────────────────────────
  cartGrid.addEventListener("click", e => {
    const qtyBtn = e.target.closest(".qty-btn");
    const removeBtn = e.target.closest(".remove-btn");

    if (qtyBtn) {
      const idx    = Number(qtyBtn.dataset.index);
      const action = qtyBtn.dataset.action;
      if (action === "inc") {
        cartData[idx].quantity = (cartData[idx].quantity || 1) + 1;
      } else {
        cartData[idx].quantity = (cartData[idx].quantity || 1) - 1;
        if (cartData[idx].quantity <= 0) cartData.splice(idx, 1);
      }
      localStorage.setItem("cart", JSON.stringify(cartData));
      syncCounter();
      renderCart();
    }

    if (removeBtn) {
      const idx = Number(removeBtn.dataset.remove);
      cartData.splice(idx, 1);
      localStorage.setItem("cart", JSON.stringify(cartData));
      syncCounter();
      renderCart();
    }
  });

  function updateTotals() {
    const subtotal   = cartData.reduce((acc, i) => acc + Number(i.price) * (i.quantity || 1), 0);
    const taxAmt     = subtotal / 10;
    const grandTotal = subtotal + taxAmt;
    subtotalEl.textContent = "$" + subtotal.toFixed(2);
    taxEl.textContent      = "$" + taxAmt.toFixed(2);
    grandEl.textContent    = "$" + grandTotal.toFixed(2);
  }

  // ── Cart panel open/close ─────────────────────────────
  const cartPanel = document.querySelector("#cart-panel");
  const overlay   = document.querySelector("#overlay");

  document.querySelector("#cart-toggle").addEventListener("click", () => {
    renderCart();
    cartPanel.classList.add("open");
    overlay.classList.add("open");
    document.body.style.overflow = "hidden";
  });

  function closeCart() {
    cartPanel.classList.remove("open");
    overlay.classList.remove("open");
    document.body.style.overflow = "";
  }

  // Init totals
  renderCart();
</script>
</body>
</html>
