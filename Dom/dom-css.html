<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        #root {
            width: 100vw;
            height: 100vh;
            background-color: bisque;
            padding: 20px 10px;
        }

        nav {
            display: flex;
            justify-content: space-evenly;
            align-items: center;

        }
    </style>
</head>

<body>

    <div id="root">

    </div>

    <script>
        // let root = document.querySelector("#root")
        // let navbar = document.createElement("div")

        // // navbar.style.height = "80px";
        // // navbar.style.backgroundColor = "red";
        // // navbar.style.cssText = `
        // // height : 80px;
        // // background-color: yellow;


        // // `
        // navbar.classList = "nav"

        // // navbar.removeAttribute("class")

        // root.append(navbar)

        let root = document.querySelector("#root");
        let navbar = document.createElement("div")
        navbar.style.cssText = `
            width: 100%;
            height: 80px;
            background-color: aquamarine;
            border-radius: 20px;
        `
        root.append(navbar)
        let cont = document.createElement("div")
        root.append(cont)
        cont.style.cssText =`
            margin-top : 20px;
            display: flex;
            justify-content: space-evenly;
            align-items: center;

        `


       let arr = ["red","yellow", "blue"]

       arr.forEach(element => {
            let box = document.createElement("div");
            box.style.cssText = `
            width: 300px;
            height: 300px;
            border-radius: 20px;
            background-color: ${element};
        ` 
            cont.append(box)
        });
        
       let name = ["sumit", "abhay", "faraz", "bharat"]
       name.forEach((el)=>{
            let h1 = document.createElement("h1")
            h1.innerText = el;

            root.append(h1)
       })




    </script>
</body>

</html>
